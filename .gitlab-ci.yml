stages:
  - test
  - build

variables:
  GO_VERSION: "1.24"
  GOPRIVATE: "git.aegis-hq.xyz"
  GOINSECURE: "git.aegis-hq.xyz"
  # Bypass pipeline refs race condition by doing manual checkout
  GIT_STRATEGY: none

.go-cache: &go-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}-go
    paths:
      - .go/pkg/mod/

test:
  stage: test
  tags: [local]
  image: golang:${GO_VERSION}-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
  before_script:
    - for i in 1 2 3 4 5; do apk add --no-cache git && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
    # Manual checkout to bypass pipeline refs race condition
    - |
      for i in 1 2 3 4 5; do
        git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
        echo "Clone attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done
    - cp -r /tmp/src/. .
    - git checkout ${CI_COMMIT_SHA}
  script:
    - go mod download
    - go test -v -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'

lint:
  stage: test
  tags: [local]
  image: golangci/golangci-lint:latest
  <<: *go-cache
  before_script:
    # Manual checkout to bypass pipeline refs race condition
    - |
      for i in 1 2 3 4 5; do
        git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
        echo "Clone attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done
    - cp -r /tmp/src/. .
    - git checkout ${CI_COMMIT_SHA}
  script:
    - golangci-lint run --timeout 5m
  allow_failure: true

build:
  stage: build
  tags: [local]
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    # Manual checkout since GIT_STRATEGY: none
    - apk add --no-cache git
    - |
      for i in 1 2 3 4 5; do
        git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
        echo "Clone attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done
    - cp -r /tmp/src/. .
    - git checkout ${CI_COMMIT_SHA}
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
  script:
    - docker build -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} -t ${CI_REGISTRY_IMAGE}:latest .
    # Push with retry (registry can return "unknown blob" on first attempt)
    - |
      success=false
      for i in 1 2 3 4 5; do
        if docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}; then
          success=true
          break
        fi
        echo "Push attempt $i failed, retrying in $((i*10))s..."
        sleep $((i*10))
      done
      $success || { echo "ERROR: All push attempts failed for ${CI_COMMIT_SHORT_SHA}"; exit 1; }
    - |
      success=false
      for i in 1 2 3 4 5; do
        if docker push ${CI_REGISTRY_IMAGE}:latest; then
          success=true
          break
        fi
        echo "Push attempt $i failed, retrying in $((i*10))s..."
        sleep $((i*10))
      done
      $success || { echo "ERROR: All push attempts failed for latest"; exit 1; }
