stages:
  - test
  - build

variables:
  GO_VERSION: "1.24"
  # Bypass pipeline refs race condition by doing manual checkout
  GIT_STRATEGY: none

.go-cache: &go-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}-go
    paths:
      - .go/pkg/mod/

test:
  stage: test
  tags: [local]
  image: golang:${GO_VERSION}-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
  before_script:
    - for i in 1 2 3 4 5; do apk add --no-cache git && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
    # Manual checkout to bypass pipeline refs race condition
    - |
      for i in 1 2 3 4 5; do
        git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
        echo "Clone attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done
    - cp -r /tmp/src/. .
    - git checkout ${CI_COMMIT_SHA}
  script:
    - go mod download
    - go test -v -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'

lint:
  stage: test
  tags: [local]
  image: golangci/golangci-lint:latest
  <<: *go-cache
  before_script:
    # Manual checkout to bypass pipeline refs race condition
    - |
      for i in 1 2 3 4 5; do
        git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
        echo "Clone attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done
    - cp -r /tmp/src/. .
    - git checkout ${CI_COMMIT_SHA}
  script:
    - golangci-lint run --timeout 5m
  allow_failure: true

build:
  stage: build
  tags: [local]
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    # Manual checkout since GIT_STRATEGY: none
    - |
      for i in 1 2 3 4 5; do
        wget -qO- "${CI_REPOSITORY_URL/-/api/v4/projects/${CI_PROJECT_ID}/repository/archive.tar.gz?sha=${CI_COMMIT_SHA}&private_token=${CI_JOB_TOKEN}}" | tar xzf - --strip-components=1 && break
        echo "Download attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done 2>/dev/null || {
        # Fallback to git clone if API download fails
        apk add --no-cache git 2>/dev/null || true
        for i in 1 2 3 4 5; do
          git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
          echo "Clone attempt $i failed, retrying in $((i*5))s..."
          sleep $((i*5))
        done
        cp -r /tmp/src/. .
        git checkout ${CI_COMMIT_SHA}
      }
    # Configure registry authentication
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context ${CI_PROJECT_DIR}
      --dockerfile ${CI_PROJECT_DIR}/Dockerfile
      --destination ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
      --destination ${CI_REGISTRY_IMAGE}:latest
