stages:
  - test
  - build

variables:
  GO_VERSION: "1.24"
  # Bypass pipeline refs race condition by doing manual checkout
  GIT_STRATEGY: none

.go-cache: &go-cache
  cache:
    key: ${CI_COMMIT_REF_SLUG}-go
    paths:
      - .go/pkg/mod/

test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  <<: *go-cache
  variables:
    GOPATH: ${CI_PROJECT_DIR}/.go
  before_script:
    - for i in 1 2 3 4 5; do apk add --no-cache git && break || echo "Attempt $i failed, retrying in 5s..." && sleep 5; done
    # Manual checkout to bypass pipeline refs race condition
    - |
      for i in 1 2 3 4 5; do
        git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
        echo "Clone attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done
    - cp -r /tmp/src/. .
    - git checkout ${CI_COMMIT_SHA}
  script:
    - go mod download
    - go test -v -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'

lint:
  stage: test
  image: golangci/golangci-lint:latest
  <<: *go-cache
  before_script:
    # Manual checkout to bypass pipeline refs race condition
    - |
      for i in 1 2 3 4 5; do
        git clone --depth 20 --branch ${CI_COMMIT_REF_NAME} ${CI_REPOSITORY_URL} /tmp/src && break
        echo "Clone attempt $i failed, retrying in $((i*5))s..."
        sleep $((i*5))
      done
    - cp -r /tmp/src/. .
    - git checkout ${CI_COMMIT_SHA}
  script:
    - golangci-lint run --timeout 5m
  allow_failure: true

build:
  stage: build
  timeout: 90m
  variables:
    # Build needs source code, can't use GIT_STRATEGY: none
    # Use clone to minimize race condition window
    GIT_STRATEGY: clone
    GIT_DEPTH: "20"
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"auth\":\"$(printf "%s:%s" "${CI_REGISTRY_USER}" "${CI_REGISTRY_PASSWORD}" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor
      --context ${CI_PROJECT_DIR}
      --dockerfile ${CI_PROJECT_DIR}/Dockerfile
      --destination ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
      --destination ${CI_REGISTRY_IMAGE}:latest
      --skip-unused-stages
      --cache=true
      --cache-repo=${CI_REGISTRY_IMAGE}/cache
