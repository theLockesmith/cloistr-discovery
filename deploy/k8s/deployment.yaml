# Reference manifest - generated by Atlas
# DO NOT apply manually - use: atlas kube apply coldforge-discovery
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coldforge-discovery
  namespace: coldforge-discovery
  labels:
    app.kubernetes.io/name: coldforge-discovery
    app.kubernetes.io/instance: coldforge-discovery
    app.kubernetes.io/part-of: coldforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: coldforge-discovery
      app.kubernetes.io/instance: coldforge-discovery
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coldforge-discovery
        app.kubernetes.io/instance: coldforge-discovery
        app.kubernetes.io/part-of: coldforge
    spec:
      containers:
        - name: discovery
          image: # Set by CI/CD pipeline
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: coldforge-discovery-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
